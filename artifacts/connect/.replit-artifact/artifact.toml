kind = "web"
previewPath = "/"
title = "Connect"
version = "1.0.0"
id = "artifacts/connect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20001

[services.development]
run = "pnpm --filter @workspace/connect run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/connect", "run", "build" ]
publicDir = "artifacts/connect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20001"
BASE_PATH = "/"
